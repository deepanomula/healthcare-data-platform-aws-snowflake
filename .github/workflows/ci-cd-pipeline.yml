name: Healthcare Data Platform CI/CD

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: "us-east-1"

jobs:
  # STAGE 1: AUTOMATED TESTING (CI)
  ci-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'

      - name: Install Dependencies & Test
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 pandas pyarrow boto3
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          if [ -f src/lambda/test_lambda.py ]; then pytest src/lambda/test_lambda.py; fi

  # STAGE 2: CONTINUOUS DEPLOYMENT (CD)
  cd-deployment:
    needs: ci-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.7

      # 1. Configure cloud authentication
      # 1. Configure cloud authentication
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      # 2. Package your Python applications into zip payloads dynamically
      - name: Package Lambda Zip Payloads
        run: |
          cd src/lambda
          zip ../../terraform/router_payload.zip router_handler.py
          zip ../../terraform/transformer_payload.zip lambda_function.py

      # 💡 FIX: Write the exact file the provider's fallback engine is looking for!
      # 💡 FIX: Add both [default] and [tf_profile] blocks to completely clear the state cache mismatch!
      - name: Generate Snowflake Config File
        run: |
          mkdir -p ~/.snowflake
          cat << 'EOF' > ~/.snowflake/config
          [default]
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          account = "pr96137"
          region = "us-east-2.aws"

          [tf_profile]
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          account = "pr96137"
          region = "us-east-2.aws"

          [profile.tf_profile]
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          account = "pr96137"
          region = "us-east-2.aws"
          EOF
      # 3. Initialize and deploy your infrastructure live to AWS & Snowflake
      - name: Terraform Init and Apply
        run: |
          cd terraform
          terraform init -reconfigure
          terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}