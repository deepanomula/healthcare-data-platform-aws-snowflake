name: Healthcare Data Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Set the environment variable globally across the entire runner matrix
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-validation:
    runs-on: ubuntu-latest

    steps:
      # 1. Bumped checkout template version to keep it compatible with Node 24
      - name: Checkout Repository Code
        uses: actions/checkout@v4.1.7

      # 2. Bumped setup-python template version to keep it compatible with Node 24
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f src/lambda/requirements.txt ]; then pip install -r src/lambda/requirements.txt; fi
          pip install pytest flake8

      - name: Run Flake8 Code Style Linter
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Execute PyTest Unit Test Matrix
        run: |
          if [ -f src/lambda/test_lambda.py ]; then pytest src/lambda/test_lambda.py; else echo "No unit tests found yet!"; fi